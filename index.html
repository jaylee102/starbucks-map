<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>스타벅스 멋진매장 찾아가기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --green:#00704A;--green-dark:#1E3932;--green-light:#d4edda;--green-pale:#f0faf5;
  --gold:#CBA258;--bg:#fff;--bg2:#f7f7f5;--border:rgba(0,0,0,0.1);
  --text:#1a1a1a;--text2:#666;--text3:#aaa;--radius:12px;--radius-sm:8px;
}
html,body{height:100%;overflow:hidden}
body{font-family:'Noto Sans KR',sans-serif;background:#e0e0e0;color:var(--text);font-size:14px}
.app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto;background:var(--bg);box-shadow:0 0 40px rgba(0,0,0,0.15)}
.header{background:var(--green-dark);color:white;padding:14px 16px 12px;flex-shrink:0}
.header-top{display:flex;align-items:center;gap:10px}
.header-title{font-size:16px;font-weight:700;letter-spacing:-0.3px}
.header-sub{font-size:11px;opacity:.7;margin-top:2px;margin-left:32px}
.progress-wrap{margin-top:8px;background:rgba(255,255,255,.2);border-radius:10px;height:5px}
.progress-bar{background:var(--gold);border-radius:10px;height:5px;transition:width .5s ease}
.tabs{display:flex;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0}
.tab{flex:1;padding:10px 0 8px;font-size:11px;text-align:center;cursor:pointer;color:var(--text3);border:none;background:none;transition:color .2s;border-bottom:2px solid transparent;font-family:inherit}
.tab svg{display:block;margin:0 auto 3px;width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.tab.active{color:var(--green);border-bottom-color:var(--green);font-weight:500}
.content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}

/* MAP */
#map{width:100%;height:340px}
.map-info{padding:9px 14px;background:var(--bg);border-bottom:1px solid var(--border);font-size:11px;color:var(--text2);display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:5px}
.leg-dot{width:9px;height:9px;border-radius:50%;border:1.5px solid white}
.region-chips{display:flex;flex-wrap:wrap;gap:5px;padding:10px 14px;border-bottom:1px solid var(--border)}
.rchip{font-size:11px;padding:3px 9px;border-radius:20px;background:var(--bg2);color:var(--text2);cursor:pointer}
.rchip.has{background:var(--green-light);color:var(--green);font-weight:500}

/* LIST */
.search-wrap{padding:10px 12px;background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:5;position:relative}
.search-wrap input{width:100%;padding:9px 14px 9px 36px;font-size:13px;border:1px solid var(--border);border-radius:24px;background:var(--bg2);color:var(--text);font-family:inherit;outline:none}
.search-wrap input:focus{border-color:var(--green);background:var(--bg)}
.s-icon{position:absolute;left:22px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--text3);pointer-events:none}
.s-icon svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}
.filter-row{display:flex;gap:6px;padding:8px 12px;overflow-x:auto;border-bottom:1px solid var(--border);scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.fbtn{padding:5px 12px;border-radius:20px;font-size:12px;white-space:nowrap;cursor:pointer;border:1px solid var(--border);background:var(--bg);color:var(--text2);font-family:inherit;transition:all .15s}
.fbtn.active{background:var(--green);color:white;border-color:var(--green)}
.store-item{display:flex;align-items:center;gap:11px;padding:11px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.store-item:active{background:var(--bg2)}
.store-item.visited{background:var(--green-pale)}
.snum{font-size:12px;color:var(--text3);min-width:26px;font-weight:500}
.sinfo{flex:1;min-width:0}
.sname{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.smeta{font-size:11px;color:var(--text2);margin-top:2px}
.stags{display:flex;gap:3px;margin-top:4px;flex-wrap:wrap}
.stag{font-size:10px;padding:1px 7px;border-radius:8px;background:var(--green-light);color:var(--green)}
.stag.dt{background:#e8f0fb;color:#1a5fa8}
.stag.r{background:#f3e8ff;color:#7c3aed}
.chkbtn{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:1.5px solid var(--border);background:var(--bg);cursor:pointer;flex-shrink:0;transition:all .2s}
.chkbtn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.chkbtn.done{background:var(--green);border-color:var(--green);color:white}
.chkbtn.done svg{stroke:white}

/* MY */
.my-wrap{padding:16px}
.my-title{font-size:16px;font-weight:700;margin-bottom:3px}
.my-sub{font-size:12px;color:var(--text2);margin-bottom:14px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat-card{background:var(--bg2);border-radius:var(--radius-sm);padding:14px}
.stat-val{font-size:26px;font-weight:700;color:var(--green)}
.stat-label{font-size:11px;color:var(--text2);margin-top:2px}
.prog-card{background:var(--bg2);border-radius:var(--radius-sm);padding:14px;margin-bottom:14px}
.prog-label{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:8px}
.prog-track{background:rgba(0,0,0,.1);border-radius:10px;height:8px}
.prog-fill{background:linear-gradient(90deg,var(--green-dark),var(--green));border-radius:10px;height:8px;transition:width .5s ease}
.vs-section h3{font-size:14px;font-weight:600;margin-bottom:10px}
.empty-state{text-align:center;padding:48px 16px;color:var(--text3)}
.empty-state svg{width:48px;height:48px;stroke:currentColor;fill:none;stroke-width:1.2;stroke-linecap:round;stroke-linejoin:round;margin-bottom:12px}
.empty-state p{font-size:13px;line-height:1.6}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:none;align-items:flex-end}
.overlay.open{display:flex}
.modal{background:var(--bg);border-radius:20px 20px 0 0;width:100%;max-width:480px;margin:0 auto;max-height:92vh;overflow-y:auto;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:12px auto}
.modal-body{padding:0 16px 40px}
.modal-num{font-size:34px;font-weight:700;color:var(--green);line-height:1}
.modal-name{font-size:19px;font-weight:700;margin-top:4px;letter-spacing:-.5px}
.modal-region{font-size:12px;color:var(--text2);margin-top:4px}
.modal-tags{display:flex;gap:6px;flex-wrap:wrap;margin:12px 0}
.mtag{font-size:12px;padding:4px 12px;border-radius:20px;background:var(--green-light);color:var(--green);font-weight:500}
.mtag.dt{background:#e8f0fb;color:#1a5fa8}
.mtag.r{background:#f3e8ff;color:#7c3aed}
.modal-desc{font-size:13px;color:var(--text2);line-height:1.7;background:var(--bg2);padding:12px 14px;border-radius:var(--radius-sm);margin-bottom:14px}
.info-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.info-badge{font-size:11px;padding:4px 10px;border-radius:20px;background:var(--bg2);color:var(--text2)}
.map-btn{display:flex;align-items:center;gap:6px;padding:10px 14px;background:var(--green-pale);border:1px solid var(--green-light);border-radius:var(--radius-sm);color:var(--green);font-size:13px;font-weight:500;text-decoration:none;margin-bottom:16px;cursor:pointer;width:100%;justify-content:center;font-family:inherit}
.sec-title{font-size:14px;font-weight:600;margin-bottom:10px}
.photo-area{border:2px dashed var(--border);border-radius:var(--radius);padding:24px 16px;text-align:center;cursor:pointer;color:var(--text2);font-size:13px;margin-bottom:12px}
.photo-area svg{width:32px;height:32px;stroke:var(--text3);fill:none;stroke-width:1.5;stroke-linecap:round;display:block;margin:0 auto 8px}
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px}
.photo-thumb{aspect-ratio:1;border-radius:10px;overflow:hidden;position:relative;background:var(--green-light);display:flex;align-items:center;justify-content:center;font-size:28px}
.photo-del{position:absolute;top:3px;right:3px;background:rgba(0,0,0,.5);color:white;border:none;border-radius:50%;width:20px;height:20px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.confirm-btn{width:100%;padding:15px;background:var(--green);color:white;border:none;border-radius:var(--radius);font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:-.3px;transition:background .2s}
.confirm-btn:active{background:var(--green-dark)}
.confirm-btn.done{background:var(--bg2);color:var(--text2)}
.visit-time{text-align:center;font-size:11px;color:var(--text3);margin-top:8px}
.close-btn{float:right;background:var(--bg2);border:none;border-radius:50%;width:30px;height:30px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.close-btn svg{width:14px;height:14px;stroke:var(--text2);fill:none;stroke-width:2;stroke-linecap:round}
input[type=file]{display:none}
.stars{color:var(--gold);font-size:12px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--green-dark);color:white;padding:10px 20px;border-radius:24px;font-size:13px;opacity:0;transition:all .3s;z-index:2000;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}


</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8.5 9.5c0-1.93 1.57-3.5 3.5-3.5s3.5 1.57 3.5 3.5c0 3-3.5 5-3.5 5s-3.5-2-3.5-5z"/></svg>

    </button>
  </div>
  <div class="content" id="content"></div>
</div>

<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal" id="modal"><div class="modal-handle"></div><div class="modal-body" id="modal-body"></div></div>
</div>
<input type="file" accept="image/*" multiple id="photo-input" onchange="handlePhotos(event)">
<div class="toast" id="toast"></div>

// 공유 사진 로드
let sharedPhotos = {};
async function loadSharedPhotos(storeId) {
  try {
    const { data } = await sbClient.storage.from('photos').list(`store_${storeId}`);
    if (data && data.length > 0) {
      sharedPhotos[storeId] = data.map(f => `https://sicdymvnmmmgpxbtppzx.supabase.co/storage/v1/object/public/photos/store_${storeId}/${f.name}`);
    }
  } catch(e) { console.log(e); }
}

// 사진 업로드
async function uploadPhoto(storeId, file) {
  const ext = file.name.split('.').pop();
  const now = new Date();
  const dateStr = now.getFullYear() + ('0'+(now.getMonth()+1)).slice(-2) + ('0'+now.getDate()).slice(-2) + '_' + ('0'+now.getHours()).slice(-2) + ('0'+now.getMinutes()).slice(-2) + ('0'+now.getSeconds()).slice(-2);
  const fileName = `store_${storeId}/${dateStr}_${Math.random().toString(36).slice(2,7)}.${ext}`;
  const { error } = await sbClient.storage.from('photos').upload(fileName, file, { cacheControl: '3600', upsert: false });
  if (error) throw error;
  return `https://sicdymvnmmmgpxbtppzx.supabase.co/storage/v1/object/public/photos/${fileName}`;
}
let kakaoMap=null, markers=[];

function save(){
  localStorage.setItem('sb103_v',JSON.stringify(visited));
  localStorage.setItem('sb103_p',JSON.stringify(photos));
  localStorage.setItem('sb103_t',JSON.stringify(times));
}
function vCount(){return Object.keys(visited).filter(k=>visited[k]).length}
function updateHeader(){
  const n=vCount();
  document.getElementById('header-sub').textContent=`${n} / 103 방문 완료`;
  document.getElementById('progress-bar').style.width=`${Math.round(n/103*100)}%`;
}
function switchTab(t){
  tab=t;
  ['map','list','my'].forEach(x=>document.getElementById('tab-'+x).classList.toggle('active',x===t));
  render();
}
function render(){
  const el=document.getElementById('content');
  if(tab==='map')renderMap(el);
  else if(tab==='list')renderList(el);
  else renderMy(el);
}

// ===== Leaflet 지도 =====
function renderMap(el){
  const regions={};
  STORES.forEach(s=>{if(!regions[s.region])regions[s.region]={t:0,v:0};regions[s.region].t++;if(visited[s.id])regions[s.region].v++;});
  const chips=Object.entries(regions).map(([r,d])=>`<span class="rchip ${d.v>0?'has':''}" onclick="filterMapRegion('${r}')">${r} ${d.v}/${d.t}</span>`).join('');
  const partChips=PARTS_LIST.filter(p=>p.key!=='전체').map(p=>{
    const ps=STORES.filter(s=>s.stars===p.key);
    const pv=ps.filter(s=>visited[s.id]).length;
    return `<span class="rchip ${pv>0?'has':''}" style="border:1px solid ${p.color};color:${pv>0?'white':p.color};background:${pv>0?p.color:'transparent'}" onclick="filterMapPart('${p.key}')">${p.label} ${pv}/${ps.length}</span>`;
  }).join('');

  el.innerHTML=`
    <div id="map"></div>
    <div class="map-info">
      <div class="legend-item"><div class="leg-dot" style="background:#00704A"></div>✓ 방문</div>
      <div class="legend-item"><div class="leg-dot" style="background:#1a5fa8"></div>DT</div>
      <div class="legend-item"><div class="leg-dot" style="background:#7c3aed"></div>R</div>
      <div class="legend-item"><div class="leg-dot" style="background:#888"></div>G(일반)</div>
      <span style="margin-left:auto;font-size:10px;color:var(--text3)">마커 클릭 → 상세</span>
    </div>
    <div style="padding:6px 14px;font-size:11px;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border)">📍 지역별</div>
    <div class="region-chips">${chips}</div>
    <div style="padding:6px 14px;font-size:11px;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border)">📖 파트별</div>
    <div class="region-chips">${partChips}</div>
  `;
  setTimeout(initLeafletMap, 100);
}

function initLeafletMap(){
  const container=document.getElementById('map');
  if(!container)return;
  if(kakaoMap){kakaoMap.remove();kakaoMap=null;}

  kakaoMap=L.map('map', {
    center: [36.5, 127.8],
    zoom: 7,
    minZoom: 5,
    maxZoom: 17
  });

  // 전세계 타일 (흐릿하게 - 다른나라)
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© OpenStreetMap contributors',
    maxZoom:19,
    opacity: 0.25
  }).addTo(kakaoMap);

  // 한국만 선명하게 덮어씌우기
  const koreaBounds = L.latLngBounds(
    L.latLng(33.0, 124.5),
    L.latLng(38.9, 130.5)
  );
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    maxZoom:19,
    opacity: 1.0,
    bounds: koreaBounds
  }).addTo(kakaoMap);

  markers=[];
  STORES.forEach(s=>addMarker(s));
}

function makeIcon(s){
  const v=visited[s.id];
  const bg=v?'#00704A':s.type==='DT'?'#1a5fa8':s.type==='R'?'#7c3aed':'#888';
  const label=v?'✓':s.type==='DT'?'DT':s.type==='R'?'R':'G';
  const border='2px solid white';
  const shadow='0 2px 6px rgba(0,0,0,0.35)';
  const fontSize=v?'13px':'9px';
  const html=`<div style="width:22px;height:22px;border-radius:50%;background:${bg};border:${border};box-shadow:${shadow};display:flex;align-items:center;justify-content:center;font-size:${fontSize};font-weight:700;color:white;line-height:1">${label}</div>`;
  return L.divIcon({html,className:'',iconSize:[22,22],iconAnchor:[11,11]});
}

function addMarker(s){
  const marker=L.marker([s.lat,s.lng],{icon:makeIcon(s)}).addTo(kakaoMap);
  marker.on('click',()=>openStore(s.id));
  markers.push({store:s,marker});
}

function filterMapRegion(r){
  if(!kakaoMap)return;
  const rs=STORES.filter(s=>s.region===r);
  if(!rs.length)return;
  const bounds=L.latLngBounds(rs.map(s=>[s.lat,s.lng]));
  kakaoMap.fitBounds(bounds,{padding:[20,20]});
}
function filterMapPart(p){
  if(!kakaoMap)return;
  const ps=STORES.filter(s=>s.stars===p);
  if(!ps.length)return;
  const bounds=L.latLngBounds(ps.map(s=>[s.lat,s.lng]));
  kakaoMap.fitBounds(bounds,{padding:[20,20]});
}

function refreshMarkers(){
  if(!kakaoMap)return;
  markers.forEach(m=>m.marker.remove());
  markers=[];
  STORES.forEach(s=>addMarker(s));
}

// ===== 목록 =====
function renderList(el){
  const list=STORES.filter(s=>{
    const rOk=filter==='전체'||s.region===filter;
    const pOk=partFilter==='전체'||s.stars===partFilter;
    const sOk=!query||s.name.includes(query)||s.region.includes(query)||s.view.includes(query)||s.partName.includes(query);
    return rOk&&pOk&&sOk;
  });
  const items=list.map(s=>{
    const v=visited[s.id];
    const tc=s.type==='DT'?'dt':s.type==='R'?'r':'';
    return `<div class="store-item ${v?'visited':''}" onclick="openStore(${s.id})">
      <span class="snum">${s.id}</span>
      <div class="sinfo">
        <div class="sname">${s.name}</div>
        <div class="smeta">📍 ${s.region} · ${s.view}</div>
        <div class="stags">
          ${s.type!=='일반'?`<span class="stag ${tc}">${s.type==='DT'?'드라이브스루':'리저브'}</span>`:''}
          <span class="stag" style="background:${s.partColor||'#888'}22;color:${s.partColor||'#888'}">${s.partName||''}</span>
          ${v?'<span class="stag">✓ 방문완료</span>':''}
        </div>
      </div>
      <button class="chkbtn ${v?'done':''}" onclick="event.stopPropagation();qVisit(${s.id})">
        <svg viewBox="0 0 24 24">${v?'<polyline points="20 6 9 17 4 12"/>':'<path d="M12 5v14M5 12h14"/>'}</svg>
      </button>
    </div>`;
  }).join('')||`<div style="padding:40px;text-align:center;color:var(--text3);font-size:13px">검색 결과가 없어요</div>`;

  el.innerHTML=`
    <div class="search-wrap">
      <div class="s-icon"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div>
      <input type="text" placeholder="매장명·지역·파트 검색..." value="${query}" oninput="query=this.value;render()">
    </div>
    <div class="filter-row">${REGIONS.map(r=>`<button class="fbtn ${filter===r?'active':''}" onclick="filter='${r}';render()">${r}</button>`).join('')}</div>
    <div style="padding:5px 12px 0;font-size:11px;font-weight:600;color:var(--text2)">📖 파트별 필터</div>
    <div class="filter-row">${PARTS_LIST.map(p=>`<button class="fbtn ${partFilter===p.key?'active':''}" style="${partFilter===p.key?'background:'+p.color+';border-color:'+p.color+';color:white':'border-color:'+p.color+';color:'+p.color}" onclick="partFilter='${p.key}';render()">${p.label}</button>`).join('')}</div>
    <div>${items}</div>
  `;
}

// ===== 나의 기록 =====

// ===== 모달 =====
function openStore(id){
  curStore=STORES.find(s=>s.id===id);
  renderModal();
  document.getElementById('overlay').classList.add('open');
}
function renderModal(){
  const s=curStore,v=visited[s.id],p=photos[s.id]||[],t=times[s.id]||'';
  const tc=s.type==='DT'?'dt':s.type==='R'?'r':'';
  const typeLabel={DT:'드라이브스루',R:'리저브',일반:'일반'};
  const photoHtml=p.length?`<div class="photo-grid">${p.map((item,i)=>{
    const url=typeof item==='object'?item.url:item;
    const date=typeof item==='object'?item.date:'';

      <button class="photo-del" onclick="delPhoto(${s.id},${i})">×</button>
    </div>`;
  }).join('')}</div>`:'';
  const mapUrl=`https://map.kakao.com/link/search/${encodeURIComponent(s.name)}`;
  const naverUrl=`https://map.naver.com/v5/search/${encodeURIComponent('스타벅스 '+s.name)}`;
  const googleUrl=`https://www.google.com/search?q=스타벅스+${encodeURIComponent(s.name)}+리뷰`;

  document.getElementById('modal-body').innerHTML=`
    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:4px">
      <div>
        <div class="modal-num">#${s.id}</div>
        <div class="modal-name">${s.name}</div>
        <div class="modal-region">📍 ${s.addr}</div>
      </div>
      <button class="close-btn" onclick="closeModal()"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-tags">
      <span class="mtag ${tc}">${typeLabel[s.type]||s.type}</span>
      <span class="mtag">${s.view}</span>
    </div>
    <div class="info-row">
      <span class="info-badge" style="background:${s.partColor||'#888'}22;color:${s.partColor||'#888'};font-weight:600;border:1px solid ${s.partColor||'#888'}44">${s.partName||''}</span>
      <span class="info-badge">주차 ${s.parking}</span>
    </div>
    <div class="modal-desc">${s.desc}</div>
    <div style="display:flex;gap:6px;margin-bottom:14px">
      <a style="flex:1;display:flex;align-items:center;justify-content:center;gap:4px;padding:6px 8px;background:#FEF3C7;border:1px solid #FDE68A;border-radius:50px;color:#D97706;font-size:12px;font-weight:500;text-decoration:none" href="${mapUrl}" target="_blank">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
        길찾기
      </a>
      <a style="flex:1;display:flex;align-items:center;justify-content:center;gap:4px;padding:6px 8px;background:#03C75A;border:1px solid #02a84d;border-radius:8px;color:white;font-size:12px;font-weight:500;text-decoration:none" href="${naverUrl}" target="_blank">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        네이버 리뷰
      </a>
      <a style="flex:1;display:flex;align-items:center;justify-content:center;gap:4px;padding:6px 8px;background:#EA4335;border:1px solid #d33426;border-radius:8px;color:white;font-size:12px;font-weight:500;text-decoration:none" href="${googleUrl}" target="_blank">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        구글 리뷰
      </a>
    </div>
    <div class="sec-title">📸 나의 방문 사진</div>
    ${photoHtml}
    <div class="photo-area" onclick="document.getElementById('photo-input').click()">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      사진 추가하기<br><span style="font-size:11px;color:var(--text3)">터치하여 갤러리에서 선택</span>
    </div>
    <button class="confirm-btn ${v?'done':''}" onclick="toggleVisitModal(${s.id})">

function closeModal(e){
  if(!e||e.target===document.getElementById('overlay')){
    document.getElementById('overlay').classList.remove('open');
    curStore=null;
  }
}

// ===== 방문 처리 =====
function toggleVisit(id){
  if(visited[id]){delete visited[id];delete times[id];toast('방문 기록을 삭제했어요');}
  else{visited[id]=true;times[id]=new Date().toLocaleString('ko-KR',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});toast('방문 인증 완료! ☕');}
  save();updateHeader();
  if(tab==='map')refreshMarkers();
  else render();
}
function qVisit(id){toggleVisit(id);render();}
function toggleVisitModal(id){toggleVisit(id);if(curStore&&curStore.id===id)renderModal();}
async function handlePhotos(e){
  if(!curStore)return;
  const id=curStore.id;
  const files=Array.from(e.target.files).slice(0,5);
  if(!files.length)return;
  toast('사진 업로드 중... ⏳');
  try {
    for(const file of files){
      const url = await uploadPhoto(id, file);
      if(!photos[id])photos[id]=[];
      // 날짜 추가
      const now = new Date();
      const dateLabel = now.getFullYear()+'.'+(now.getMonth()+1)+'.'+now.getDate();
      photos[id].push({url, date: dateLabel});
    }
    if(!visited[id]){visited[id]=true;times[id]=new Date().toLocaleString('ko-KR',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});}
    save();updateHeader();renderModal();
    toast('사진 업로드 완료! 📸');
  } catch(err) {
    console.error(err);
    toast('업로드 실패. 다시 시도해주세요 😥');
  }
  e.target.value='';
}
function delPhoto(id,idx){if(photos[id]){photos[id].splice(idx,1);save();renderModal();}}
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

updateHeader();
render();
</script>
